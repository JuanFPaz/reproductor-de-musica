<!DOCTYPE html>
<html lang="en">
  <head>
    <title>W3.CSS Template</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="newStyle.css">
  </head>
  <body>
    <div class="app">
      <!-- Menú de Hamburguesa (Mobile) -->
      <button class="hamburger" id="hamburger">
        <span></span>
        <span></span>
        <span></span>
      </button>
  
      <!-- Sidebar -->
      <aside class="sidebar" id="sidebar">
        <nav>
          <ul>
            <li><a href="#" class="active">Inicio</a></li>
            <!-- Puedes agregar más enlaces aquí -->
          </ul>
        </nav>
      </aside>
  
      <!-- Main Content -->
      <main class="main-content">
        <!-- Sección de Artistas -->
        <section class="artistas">
          <h2>Artistas</h2>
          <div class="grid-artistas">
            <div class="card-artista">Artista 1</div>
            <div class="card-artista">Artista 2</div>
            <div class="card-artista">Artista 3</div>
          </div>
        </section>
  
        <!-- Sección de Playlists -->
        <section class="playlists">
          <h2>Playlists</h2>
          <div class="grid-playlists">
            <div class="card-playlist">Playlist 1</div>
            <div class="card-playlist">Playlist 2</div>
            <div class="card-playlist">Playlist 3</div>
          </div>
        </section>
      </main>
  
      <!-- Footer (Reproductor de Música) -->
      <footer class="music-player">
        <div class="player-controls">
          <button id="prev-btn">⏮</button>
          <button id="play-btn">▶</button>
          <button id="next-btn">⏭</button>
        </div>
        <div class="progress-bar">
          <div class="progress"></div>
        </div>
        <div class="song-info">
          <span id="song-title">Canción Actual</span>
          <span id="artist-name">Artista</span>
        </div>
      </footer>
    </div>
  </body>
</html>
